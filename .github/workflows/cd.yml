name: cd

on:
  push:
    tags:
      - "v*"

jobs:
  tagged-release:
    name: Tagged Release
    runs-on: windows-2022  # windows-2025 dropped InnoSetup/ISCC
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install the project
      run: uv sync --locked --all-extras --group pack
    - name: Build EXE with PyInstaller
      run: uv run python pyinstaller.py
    - name: Create Windows Installer with Inno Setup
      run: |
        $env:APP_VERSION = uvx hatch version
        iscc setup.iss
        mv dist/Minerva-*.exe .
    - name: Build Portable EXE with PyInstaller
      shell: pwsh
      run: |
        uv run python pyinstaller.py --one-file
        mv dist/Minerva.exe Minerva-${{ github.ref_name }}-portable.exe
    - name: Build project
      run: uv build
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=tag
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    - name: Deploy release
      uses: marvinpinto/action-automatic-releases@latest
      with:
        prerelease: false
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        files: |
          Minerva-*.exe
          Minerva-*-portable.exe
    - name: Publish to PyPI
      run: uv publish
